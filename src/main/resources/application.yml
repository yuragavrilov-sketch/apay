server:
  port: 8080
spring:
  application:
    name: asiapay-proxy
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
asiapay:
  base-url: https://api.asiapay.asia
  token: ${A_TOKEN:}
  timeout-ms: 5000
cache:
  fresh-ttl: PT1H
  refresh-lock-ttl: PT30S
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
---
spring:
  config:
    activate:
      on-profile: "!test"
    import: "optional:configserver:${CONFIG_SERVER_URL:https://j-srv-config.prod.payk8s.transcapital.com}"
  cloud:
    config:
      name: asiapay
      fail-fast: true
