server:
  port: 8080
spring:
  profiles:
    # Дефолтный профиль для локального запуска. В окружениях задавать явно через SPRING_PROFILES_ACTIVE.
    default: local
asiapay:
  base-url: https://api.asiapay.asia
  timeout-ms: 5000
cache:
  fresh-ttl: PT1H
  refresh-lock-ttl: PT30S
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,env,configprops
  endpoint:
    health:
      probes:
        enabled: true
    env:
      show-values: always
logging:
  level:
    org.springframework.cloud.config: DEBUG
