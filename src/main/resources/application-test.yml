# test — деплой в TEST. Все секреты и Redis Cluster приходят из Vault через config-server.
spring:
  data:
    redis:
      cluster:
        nodes:
          - ${REDIS_CLUSTER_NODES_0}
          - ${REDIS_CLUSTER_NODES_1}
          - ${REDIS_CLUSTER_NODES_2}
          - ${REDIS_CLUSTER_NODES_3}
          - ${REDIS_CLUSTER_NODES_4}
          - ${REDIS_CLUSTER_NODES_5}
        max-redirects: 3
asiapay:
  base-url: ${ASIAPAY_BASE_URL:https://haproxy:443}
  token: ${A_TOKEN}
  host-header: api.asiapay.asia
  # Корневой корп-CA (PEM) поставляется из Vault: spring.ssl.bundle.pem.tcb-root.*
  ssl-bundle: tcb-root
